name: Release

on:
  push:
    branches: [main]

# Only one release run at a time.
concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write # create the version PR / push tags
  pull-requests: write # open the "Version Packages" PR
  id-token: write # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      # changesets/action does one of two things:
      #  • if changesets are present → opens/updates a "Version Packages" PR
      #    (running `version`) that bumps versions and writes changelogs.
      #  • if none are present → runs `publish` to release the current versions.
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
